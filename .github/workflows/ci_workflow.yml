name: ci_workflow
on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
  workflow_dispatch:

jobs:
  lint_job:
    runs-on: ubuntu-latest    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Lint Code
        id: linter
        uses: astral-sh/ruff-action@v4.0.0
        
  build_job:
    runs-on: ubuntu-latest
    needs: [lint_job]
    if: success() && needs.lint_job.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.7"
          # version-file: "pyproject.toml"
          # working-directory: $GITHUB_WORKSPACE
          enable-cache: "true"
          cache-dependency-glob: "**/pyproject.toml"
          restore-cache: "true"
          activate-environment: "true"

      - name: Build        
        run: uv build

      - name: Upload Source and Wheel
        uses: actions/upload-artifact@v7.0.1
        with:
          name: source_and_wheel
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: [build_job, lint_job]
    environment: dev      
    if: success() && needs.build_job.result == 'success'
    
    steps:  
      - name: setup python
        uses: actions/setup-python@v6.1.0
        with:
          python-version:: 3.11

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
        
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: source_and_wheel

      - name: Setup config
        run: |
          cat <<EOF>> ~/.databrickscfg
          [DEFAULT]
          host      =       ${{ secrets.HOST }}
          client_id = ${{ secrets.CLIENT_ID }}          
          client_secret = ${{ secrets.CLIENT_SECRET }}
          EOF

      - name: Deploy Wheel
        run: databricks fs cp *.whl ${{ vars.UPLOAD_PATH }} --overwrite 
      
      
        
